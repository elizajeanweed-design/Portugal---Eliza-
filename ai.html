<!DOCTYPE html>
<html lang="en">
<head>
     <div style="margin-top: 20px;">
    <a href="fromscratch.html" style="color: #6f4e37; font-weight: bold; text-decoration: none; border: none #6f4e37; padding: 10px 20px; border-radius: 5px;">
        ← Back to Scratch Page
    </a>
</div>
<meta charset="UTF-8" />
<title>Portugal Word Search</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f3e7d3; /* tan */
        display: flex;
        justify-content: center;
        padding-top: 40px;
    }

    .container {
        display: flex;
        gap: 40px;
    }

    /* GRID */
    .grid {
        display: grid;
        grid-template-columns: repeat(12, 40px);
        gap: 3px;
        background: white;
        padding: 15px;
        border-radius: 12px;
    }

    .cell {
        width: 40px;
        height: 40px;
        background: #fffdf8;
        border: 1px solid #cbb89d;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor: pointer;
        user-select: none;
    }

    .cell.selected {
        background: #ffe7a3;
    }

    .cell.found {
        background: #b7f7b7;
        cursor: default;
    }

    /* SIDE PANEL */
    .panel {
        background: white;
        padding: 15px;
        border-radius: 12px;
        width: 200px;
    }

    .word {
        padding: 5px 0;
        font-size: 18px;
    }

    .word.done {
        text-decoration: line-through;
        color: green;
    }

    button {
        margin-top: 10px;
        padding: 8px;
        width: 100%;
        border: none;
        background: #c9a46a;
        color: white;
        font-weight: bold;
        cursor: pointer;
        border-radius: 6px;
    }

    button:hover {
        background: #b89055;
    }
</style>
</head>

<body>

<div class="container">

    <div id="grid" class="grid"></div>

    <div class="panel">
        <h3>Portugal Words</h3>
        <div id="wordList"></div>
        <button onclick="checkWord()">Check Word</button>
    </div>

</div>

<script>
const size = 12;

// WORDS (Portugal theme)
const words = [
    "PORTO",
    "LISBON",
    "SINTRA",
    "FADO",
    "TAGUS",
    "ALGARVE"
];

// 12x12 base grid (we will place words manually)
let grid = Array.from({ length: size }, () =>
    Array.from({ length: size }, () =>
        String.fromCharCode(65 + Math.floor(Math.random() * 26))
    )
);

// PLACE WORDS (horizontal only for simplicity)
function placeWord(word, row, col) {
    for (let i = 0; i < word.length; i++) {
        grid[row][col + i] = word[i];
    }
}

placeWord("PORTO", 0, 0);
placeWord("LISBON", 2, 0);
placeWord("SINTRA", 4, 0);
placeWord("FADO", 6, 0);
placeWord("TAGUS", 8, 0);
placeWord("ALGARVE", 10, 0);

// BUILD GRID UI
const gridEl = document.getElementById("grid");
let cellElements = [];

for (let r = 0; r < size; r++) {
    cellElements[r] = [];
    for (let c = 0; c < size; c++) {

        const div = document.createElement("div");
        div.classList.add("cell");
        div.textContent = grid[r][c];

        div.dataset.row = r;
        div.dataset.col = c;

        div.addEventListener("click", () => {
            if (div.classList.contains("found")) return;
            div.classList.toggle("selected");
        });

        gridEl.appendChild(div);
        cellElements[r][c] = div;
    }
}

// WORD LIST UI
const wordList = document.getElementById("wordList");

words.forEach(w => {
    const div = document.createElement("div");
    div.classList.add("word");
    div.textContent = w;
    div.id = "word-" + w;
    wordList.appendChild(div);
});

// CHECK FUNCTION
function checkWord() {
    let selectedCells = document.querySelectorAll(".cell.selected");

    if (selectedCells.length < 2) return;

    let word = "";
    let coords = [];

    selectedCells.forEach(cell => {
        word += cell.textContent;
        coords.push(cell);
    });

    let reversed = word.split("").reverse().join("");

    if (words.includes(word) || words.includes(reversed)) {

        let matchedWord = words.includes(word) ? word : reversed;

        // lock cells
        coords.forEach(c => {
            c.classList.remove("selected");
            c.classList.add("found");
        });

        // mark word done
        document.getElementById("word-" + matchedWord).classList.add("done");
    }

    // clear selection either way
    selectedCells.forEach(c => c.classList.remove("selected"));
}
</script>

</body>
</html>
